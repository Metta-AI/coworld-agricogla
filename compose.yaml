# Builds the images referenced by coworld_manifest_template.json.
# Service names map to manifest placeholders: agricogla -> {{AGRICOGLA_IMAGE}},
# commissioner -> {{COMMISSIONER_IMAGE}}.
services:
  agricogla:
    image: cogame-agricogla:latest
    platform: linux/amd64
    build:
      context: .
  commissioner:
    image: ghcr.io/metta-ai/commissioners-baseline:latest
    platform: linux/amd64
